                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Transaction ID (TID)</label>
                  <input type="text" id="pay-tid" class="w-full p-2 bg-surface border border-border rounded font-mono" placeholder="e.g. 0123456789" required>
                  <p class="text-[10px] text-text/50 mt-1">Check your SMS or App for the TID after transfer.</p>
                </div>
                <button type="submit" id="btn-submit-payment" class="w-full py-3 bg-accent text-bg rounded-lg font-bold hover:opacity-90 transition-opacity">Submit for Verification</button>
              </form>
            </div>
          `;
          document.body.appendChild(modal);

          document.getElementById("close-payment-modal").onclick = () => modal.remove();

          document.getElementById("payment-form").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-submit-payment");
            btn.disabled = true;
            btn.textContent = "Submitting...";

            const method = document.getElementById("pay-method").value;
            const tid = document.getElementById("pay-tid").value;

            try {
              const { error } = await window.sb.from("payment_requests").insert({
                user_id: userId,
                amount_rs: price,
                ink_amount: inkAmount,
                request_type: type,
                payment_method: method,
                transaction_id: tid,
                status: 'pending'
              });

              if (error) {
                if (error.code === '23505') throw new Error("This Transaction ID has already been submitted.");
                throw error;
              }

              window.showToast("Payment submitted! We will verify it shortly.", "success");
              modal.remove();
              await fetchWalletData();
            } catch (err) {
              window.showToast(err.message, "error");
              btn.disabled = false;
              btn.textContent = "Submit for Verification";
            }
          };
        };

        await fetchWalletData();
      };

      // Router logic moved to centralized router at the end
    </script>

    <!-- Admin Dashboard Module -->
    <script type="module">
      // Support Chat Module
      window.renderSupportChat = async () => {
        const appContent = document.getElementById("app-content");
        const user = (await window.sb.auth.getUser()).data.user;

        if (!user) {
          appContent.innerHTML = `<div class="p-8 text-center">Please <a href="#/profile" class="text-accent underline">sign in</a> to use support chat.</div>`;
          return;
        }

        appContent.innerHTML = `
          <div class="max-w-4xl mx-auto p-4 md:p-8 h-[calc(100vh-64px)] flex flex-col">
            <header class="mb-6 flex justify-between items-center">
              <div>
                <h1 class="text-3xl font-serif font-bold text-accent">Support Chat</h1>
                <p class="text-text/60">Have a concern or report? Chat with the admin here.</p>
              </div>
              <div id="ticket-status-badge"></div>
            </header>

            <div class="flex-1 bg-surface border border-border rounded-xl shadow-sm flex flex-col overflow-hidden">
              <!-- Chat History -->
              <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-bg/30">
                <div class="text-center text-text/40 py-8">Loading chat history...</div>
              </div>

              <!-- Input Area -->
              <div class="p-4 border-t border-border bg-surface">
                <form id="chat-form" class="flex gap-2">
                  <input type="text" id="chat-input" placeholder="Type your message..." class="flex-1 p-3 bg-bg border border-border rounded-lg focus:outline-none focus:border-accent" required>
                  <button type="submit" class="px-6 py-3 bg-accent text-bg rounded-lg font-bold hover:opacity-90 transition-opacity">Send</button>
                </form>
              </div>
            </div>
          </div>
        `;

        const chatHistory = document.getElementById("chat-history");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        const statusBadge = document.getElementById("ticket-status-badge");

        // Get Ticket
        let { data: ticket } = await window.sb.from("support_tickets").select("*").eq("user_id", user.id).maybeSingle();
        
        const updateStatusBadge = (status) => {
          if (!status) {
            statusBadge.innerHTML = "";
            return;
          }
          const colors = {
            pending: "bg-yellow-100 text-yellow-800 border-yellow-200",
            resolved: "bg-green-100 text-green-800 border-green-200"
          };
          statusBadge.innerHTML = `<span class="px-3 py-1 rounded-full border text-xs font-bold uppercase tracking-wider ${colors[status] || colors.pending}">${status}</span>`;
        };

        if (ticket) {
          updateStatusBadge(ticket.status);
        }

        const fetchMessages = async () => {
          if (!ticket) {
            chatHistory.innerHTML = `<div class="text-center text-text/40 py-8">Start a conversation by typing a message below.</div>`;
            return;
          }

          const { data: messages, error } = await window.sb
            .from("support_messages")
            .select("*")
            .eq("ticket_id", ticket.id)
            .order("created_at", { ascending: true });

          if (error) {
            chatHistory.innerHTML = `<div class="text-center text-red-500 p-4">Error loading messages: ${error.message}</div>`;
            return;
          }

          if (messages && messages.length > 0) {
            chatHistory.innerHTML = messages.map(msg => `
              <div class="flex ${msg.sender_role === 'admin' ? 'justify-start' : 'justify-end'}">
                <div class="max-w-[80%] p-3 rounded-2xl ${msg.sender_role === 'admin' ? 'bg-surface border border-border rounded-tl-none' : 'bg-accent text-bg rounded-tr-none'}">
                  <div class="text-xs ${msg.sender_role === 'admin' ? 'text-text/40' : 'text-bg/60'} mb-1">${msg.sender_role === 'admin' ? 'Admin' : 'You'}</div>
                  <div class="text-sm">${msg.message || msg.content || ''}</div>
                  <div class="text-[10px] ${msg.sender_role === 'admin' ? 'text-text/30' : 'text-bg/40'} mt-1 text-right">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
              </div>
            `).join("");
            chatHistory.scrollTop = chatHistory.scrollHeight;
          } else {
            chatHistory.innerHTML = `<div class="text-center text-text/40 py-8">No messages yet. Send one to start!</div>`;
          }
        };

        fetchMessages();

        // Real-time subscription
        let subscription = null;
        const setupSubscription = (tId) => {
          if (subscription) subscription.unsubscribe();
          subscription = window.sb
            .channel(`ticket-${tId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'support_messages', filter: `ticket_id=eq.${tId}` }, () => {
              fetchMessages();
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'support_tickets', filter: `id=eq.${tId}` }, (payload) => {
              updateStatusBadge(payload.new.status);
            })
            .subscribe();
        };

        if (ticket) setupSubscription(ticket.id);

        chatForm.onsubmit = async (e) => {
          e.preventDefault();
          const msg = chatInput.value.trim();
          if (!msg) return;

          chatInput.value = "";

          // Create ticket if it doesn't exist
          if (!ticket) {
            const { data: newTicket, error: createError } = await window.sb.from("support_tickets").insert({
              user_id: user.id,
              status: "pending"
            }).select().single();

            if (createError) {
              window.handleError(createError, "Failed to start support ticket.");
              return;
            }
            ticket = newTicket;
            updateStatusBadge(ticket.status);
            setupSubscription(ticket.id);
          }

          const { error } = await window.sb.from("support_messages").insert({
            ticket_id: ticket.id,
            user_id: user.id,
            message: msg,
            sender_role: "user"
          });

          if (error) {
            window.handleError(error, "Failed to send message.");
          } else {
            // Update ticket updated_at and status
            await window.sb.from("support_tickets").update({ 
              status: "pending",
              updated_at: new Date().toISOString()
            }).eq("id", ticket.id);
            fetchMessages();
          }
        };

        // Cleanup subscription on route change
        const checkRouteChange = () => {
          if (window.location.hash !== "#/support") {
            subscription.unsubscribe();
            window.removeEventListener("hashchange", checkRouteChange);
          }
        };
        window.addEventListener("hashchange", checkRouteChange);
      };

      // Admin Support Section
      const renderAdminSupport = async () => {
        const { data: tickets } = await window.sb
          .from("support_tickets")
          .select("*, user:user_id(username, display_name)")
          .order("updated_at", { ascending: false })
          .limit(50);

        return `
          <section class="space-y-6">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-serif font-bold">Support Tickets</h2>
              <div class="text-sm text-text/60">${tickets?.length || 0} active tickets</div>
            </div>

            <div class="grid md:grid-cols-3 gap-6 h-[600px]">
              <!-- Ticket List -->
              <div class="bg-surface border border-border rounded-lg overflow-hidden flex flex-col">
                <div class="p-4 border-b border-border font-bold bg-bg/30">Active Tickets</div>
                <div class="flex-1 overflow-y-auto" id="admin-ticket-list">
                  ${(tickets || []).map(t => `
                    <button class="w-full p-4 border-b border-border text-left hover:bg-bg transition-colors btn-select-ticket" data-id="${t.id}">
                      <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm">${t.user?.display_name || t.user?.username || 'Unknown User'}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded-full border ${t.status === 'pending' ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 'bg-green-100 text-green-800 border-green-200'} uppercase font-bold">${t.status}</span>
                      </div>
                      <div class="text-xs text-text/60 truncate">User ID: ${t.user_id.slice(0, 8)}...</div>
                      <div class="text-[10px] text-text/40 mt-2">${new Date(t.created_at).toLocaleDateString()}</div>
                    </button>
                  `).join("")}
                </div>
              </div>

              <!-- Chat Window -->
              <div class="md:col-span-2 bg-surface border border-border rounded-lg flex flex-col overflow-hidden" id="admin-chat-container">
                <div class="flex-1 flex items-center justify-center text-text/40 italic">
                  Select a ticket to start chatting
                </div>
              </div>
            </div>
          </section>
        `;
      };

      // Direct Messages Module
      window.renderMessages = async (activeConvId) => {
        const appContent = document.getElementById("app-content");
        appContent.innerHTML = `<div class="p-8 text-center"><div class="animate-pulse text-accent">Loading Messages...</div></div>`;

        const { data: sessionData } = await window.sb.auth.getSession();
        const currentUser = sessionData?.session?.user;

        if (!currentUser) {
          appContent.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-serif">Please sign in to view messages</h2></div>`;
          return;
        }

        // Fetch conversations
        const { data: convs, error: convsError } = await window.sb
          .from("conversations")
          .select("*, initiator:initiator_id(id, username, display_name, avatar_url), receiver:receiver_id(id, username, display_name, avatar_url)")
          .or(`initiator_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
          .order("updated_at", { ascending: false });

        if (convsError) {
          window.handleError(convsError, "Failed to load conversations.");
          return;
        }

        // Fetch blocks
        const { data: blocks } = await window.sb
          .from("user_blocks")
          .select("*")
          .or(`blocker_id.eq.${currentUser.id},blocked_id.eq.${currentUser.id}`);

        const blockedUserIds = new Set(blocks?.map(b => b.blocker_id === currentUser.id ? b.blocked_id : b.blocker_id) || []);

        appContent.innerHTML = `
          <div class="max-w-6xl mx-auto p-4 md:p-8 h-[calc(100vh-80px)] flex flex-col">
            <h1 class="text-3xl font-serif font-bold mb-6 shrink-0">Messages</h1>
            
            <div class="flex-1 bg-surface border border-border rounded-xl overflow-hidden flex flex-col md:flex-row shadow-sm min-h-0">
              
              <!-- Sidebar: Conversations List -->
              <div class="w-full md:w-1/3 border-r border-border flex flex-col ${activeConvId ? 'hidden md:flex' : 'flex'}">
                <div class="p-4 border-b border-border bg-bg/30 font-bold">Conversations</div>
                <div class="flex-1 overflow-y-auto" id="conv-list">
                  ${convs.length === 0 ? `<div class="p-8 text-center text-text/50 text-sm">No messages yet.</div>` : ''}
                  ${convs.map(c => {
                    const otherUser = c.initiator_id === currentUser.id ? c.receiver : c.initiator;
                    const isBlocked = blockedUserIds.has(otherUser.id);
                    const isActive = c.id === activeConvId;
                    const avatar = otherUser.avatar_url ? `<img src="${otherUser.avatar_url}" class="w-full h-full object-cover" referrerPolicy="no-referrer">` : `<div class="w-full h-full bg-accent2 text-bg flex items-center justify-center font-bold text-xs">${(otherUser.display_name || otherUser.username || '?').substring(0,2).toUpperCase()}</div>`;
                    
                    return `
                      <a href="#/messages/${c.id}" class="flex items-center gap-3 p-4 border-b border-border hover:bg-bg transition-colors ${isActive ? 'bg-bg border-l-4 border-l-accent' : ''} ${isBlocked ? 'opacity-50' : ''}">
                        <div class="w-10 h-10 rounded-full overflow-hidden shrink-0 border border-border">
                          ${avatar}
                        </div>
                        <div class="flex-1 min-w-0">
                          <div class="flex justify-between items-baseline mb-1">
                            <h3 class="font-bold text-sm truncate">${window.sanitize(otherUser.display_name || otherUser.username)}</h3>
                            <span class="text-[10px] text-text/40 shrink-0">${new Date(c.updated_at).toLocaleDateString()}</span>
                          </div>
                          <div class="text-xs text-text/60 truncate flex items-center gap-2">
                            ${c.status === 'pending' ? '<span class="px-1.5 py-0.5 bg-yellow-100 text-yellow-800 rounded text-[8px] uppercase font-bold">Pending</span>' : ''}
                            ${c.status === 'rejected' ? '<span class="px-1.5 py-0.5 bg-red-100 text-red-800 rounded text-[8px] uppercase font-bold">Declined</span>' : ''}
                            ${isBlocked ? '<span class="px-1.5 py-0.5 bg-red-100 text-red-800 rounded text-[8px] uppercase font-bold">Blocked</span>' : ''}
                          </div>
                        </div>
                      </a>
                    `;
                  }).join('')}
                </div>
              </div>

              <!-- Main: Chat Window -->
              <div class="flex-1 flex flex-col bg-bg/10 ${!activeConvId ? 'hidden md:flex' : 'flex'} relative">
                ${!activeConvId ? `
                  <div class="flex-1 flex items-center justify-center text-text/40 italic">
                    Select a conversation to start messaging
                  </div>
                ` : `
                  <div id="chat-header" class="p-4 border-b border-border bg-surface flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-3">
                      <a href="#/messages" class="md:hidden p-2 -ml-2 text-text/60 hover:text-text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                      </a>
                      <div id="chat-title" class="font-bold">Loading...</div>
                    </div>
                    <button id="btn-block-user" class="text-xs text-red-500 hover:underline hidden">Block User</button>
                  </div>
                  
                  <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <div class="text-center text-accent animate-pulse">Loading messages...</div>
                  </div>
                  
                  <div id="chat-actions" class="p-4 border-t border-border bg-surface shrink-0 hidden">
                    <!-- Dynamic actions (Accept/Reject or Input) -->
                  </div>
                `}
              </div>
            </div>
          </div>
        `;

        if (activeConvId) {
          const activeConv = convs.find(c => c.id === activeConvId);
          if (!activeConv) {
            document.getElementById("chat-messages").innerHTML = `<div class="text-center text-red-500">Conversation not found.</div>`;
            return;
          }

          const otherUser = activeConv.initiator_id === currentUser.id ? activeConv.receiver : activeConv.initiator;
          const isInitiator = activeConv.initiator_id === currentUser.id;
          const isBlocked = blockedUserIds.has(otherUser.id);
          
          document.getElementById("chat-title").innerHTML = `
            <a href="#/profile/${otherUser.username}" class="hover:text-accent transition-colors">${window.sanitize(otherUser.display_name || otherUser.username)}</a>
          `;

          const blockBtn = document.getElementById("btn-block-user");
          blockBtn.classList.remove("hidden");
          blockBtn.textContent = isBlocked ? "Unblock User" : "Block User";
          blockBtn.onclick = async () => {
            blockBtn.disabled = true;
            try {
              if (isBlocked) {
                await window.sb.from("user_blocks").delete().eq("blocker_id", currentUser.id).eq("blocked_id", otherUser.id);
                window.showToast("User unblocked.", "success");
              } else {
                await window.sb.from("user_blocks").insert({ blocker_id: currentUser.id, blocked_id: otherUser.id });
                window.showToast("User blocked.", "success");
              }
              window.renderMessages(activeConvId); // Reload
            } catch (err) {
              window.handleError(err, "Failed to update block status.");
              blockBtn.disabled = false;
            }
          };

          const chatActions = document.getElementById("chat-actions");
          chatActions.classList.remove("hidden");

          if (isBlocked) {
            chatActions.innerHTML = `<div class="text-center text-red-500 text-sm py-2">You have blocked this user or they have blocked you.</div>`;
          } else if (activeConv.status === 'rejected') {
            chatActions.innerHTML = `<div class="text-center text-red-500 text-sm py-2">This message request was declined.</div>`;
          } else if (activeConv.status === 'pending' && !isInitiator) {
            chatActions.innerHTML = `
              <div class="flex flex-col items-center gap-2">
                <div class="text-sm text-text/70 mb-2">${window.sanitize(otherUser.display_name || otherUser.username)} wants to send you a message.</div>
                <div class="flex gap-4 w-full max-w-xs">
                  <button id="btn-reject-conv" class="flex-1 py-2 border border-red-200 text-red-600 bg-red-50 rounded hover:bg-red-100 transition-colors font-medium text-sm">Decline</button>
                  <button id="btn-accept-conv" class="flex-1 py-2 bg-accent text-bg rounded hover:opacity-90 transition-opacity font-medium text-sm">Accept</button>
                </div>
              </div>
            `;
            document.getElementById("btn-accept-conv").onclick = async () => {
              await window.sb.from("conversations").update({ status: 'accepted' }).eq("id", activeConvId);
              window.renderMessages(activeConvId);
            };
            document.getElementById("btn-reject-conv").onclick = async () => {
              await window.sb.from("conversations").update({ status: 'rejected' }).eq("id", activeConvId);
              window.renderMessages(activeConvId);
            };
          } else {
            // Accepted OR (Pending AND isInitiator)
            chatActions.innerHTML = `
              ${activeConv.status === 'pending' ? `<div class="text-center text-text/50 text-[10px] uppercase font-bold tracking-wider mb-3">Waiting for ${window.sanitize(otherUser.display_name || otherUser.username)} to accept</div>` : ''}
              <form id="dm-form" class="flex gap-2">
                <input type="text" id="dm-input" placeholder="Type a message..." required class="flex-1 px-4 py-2 rounded-full bg-bg border border-border focus:outline-none focus:border-accent text-text text-sm">
                <button type="submit" class="w-10 h-10 rounded-full bg-accent text-bg flex items-center justify-center hover:opacity-90 transition-opacity shrink-0">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
              </form>
            `;

            document.getElementById("dm-form").onsubmit = async (e) => {
              e.preventDefault();
              const input = document.getElementById("dm-input");
              const msg = input.value.trim();
              if (!msg) return;
              
              input.value = "";
              try {
                await window.sb.from("direct_messages").insert({
                  conversation_id: activeConvId,
                  sender_id: currentUser.id,
                  message: msg
                });
                await window.sb.from("conversations").update({ updated_at: new Date().toISOString() }).eq("id", activeConvId);
              } catch (err) {
                window.handleError(err, "Failed to send message.");
              }
            };
          }

          // Fetch and render messages
          const fetchDMs = async () => {
            const { data: messages, error } = await window.sb
              .from("direct_messages")
              .select("*")
              .eq("conversation_id", activeConvId)
              .order("created_at", { ascending: true });
            
            if (error) {
              document.getElementById("chat-messages").innerHTML = `<div class="text-center text-red-500">Failed to load messages.</div>`;
              return;
            }

            const chatMessages = document.getElementById("chat-messages");
            if (messages.length === 0) {
              chatMessages.innerHTML = `<div class="text-center text-text/40 py-8 text-sm">No messages yet. Say hi!</div>`;
            } else {
              chatMessages.innerHTML = messages.map(msg => {
                const isMine = msg.sender_id === currentUser.id;
                return `
                  <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[75%] p-3 rounded-2xl ${isMine ? 'bg-accent text-bg rounded-tr-none' : 'bg-surface border border-border rounded-tl-none'}">
                      <div class="text-sm break-words">${window.sanitize(msg.message)}</div>
                      <div class="text-[9px] ${isMine ? 'text-bg/60' : 'text-text/40'} mt-1 text-right">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                  </div>
                `;
              }).join('');
              chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Mark as read
            const unreadIds = messages.filter(m => !m.is_read && m.sender_id !== currentUser.id).map(m => m.id);
            if (unreadIds.length > 0) {
              await window.sb.from("direct_messages").update({ is_read: true }).in("id", unreadIds);
              window.updateUnreadBadge();
            }
          };

          await fetchDMs();

          // Realtime subscription for this conversation
          if (window.currentConvSub) window.currentConvSub.unsubscribe();
          window.currentConvSub = window.sb
            .channel(`conv-${activeConvId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `conversation_id=eq.${activeConvId}` }, () => {
              fetchDMs();
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'conversations', filter: `id=eq.${activeConvId}` }, () => {
              window.renderMessages(activeConvId); // Reload if status changes
            })
            .subscribe();
        } else {
          if (window.currentConvSub) {
            window.currentConvSub.unsubscribe();
            window.currentConvSub = null;
          }
        }
      };

      const renderAdminDMsModeration = async () => {
        const { data: conversations } = await window.sb
          .from("conversations")
          .select("*, initiator:initiator_id(username, display_name), receiver:receiver_id(username, display_name)")
          .order("updated_at", { ascending: false })
          .limit(20);

        if (!conversations || conversations.length === 0) {
          return `
            <section>
              <h2 class="text-2xl font-serif font-bold mb-6">Direct Messages Moderation</h2>
              <div class="bg-surface border border-border rounded-lg p-8 text-center text-text/60 shadow-sm">
                No conversations found.
              </div>
            </section>
          `;
        }

        return `
          <section>
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-serif font-bold">Direct Messages Moderation</h2>
              <div class="text-sm text-text/60">Recent Conversations</div>
            </div>
            <div class="bg-surface border border-border rounded-lg overflow-hidden shadow-sm">
              <div class="grid grid-cols-1 md:grid-cols-3 h-[500px]">
                <!-- Conversations List -->
                <div class="border-r border-border flex flex-col">
                  <div class="p-4 border-b border-border bg-bg/50 font-medium text-sm">Conversations</div>

                      <div class="flex justify-start">
                        <div class="max-w-[85%] p-2 rounded-xl bg-surface border border-border">
                          <div class="text-xs font-bold text-accent mb-1">${window.sanitize(msg.sender?.display_name || msg.sender?.username)}</div>
                          <div class="text-sm break-words">${window.sanitize(msg.message)}</div>
                          <div class="text-[9px] text-text/40 mt-1 text-right">${new Date(msg.created_at).toLocaleString()}</div>
                        </div>
                      </div>
                    `).join('')}
                  </div>
                `;
                const historyEl = document.getElementById("admin-dm-history");
                if (historyEl) historyEl.scrollTop = historyEl.scrollHeight;

                document.getElementById("admin-delete-conv-btn").onclick = async () => {
                  if (confirm("Are you sure you want to delete this entire conversation? This action cannot be undone.")) {
                    await window.sb.from("conversations").delete().eq("id", convId);
                    window.renderAdmin();
                  }
                };
              } else {
                dmContainer.innerHTML = `<div class="flex-1 flex items-center justify-center text-text/40 text-sm">No messages in this conversation.</div>`;
              }
            };

            fetchDMs();
          };
        });

        // Admin Support Chat Logic
        document.querySelectorAll(".btn-select-ticket").forEach(btn => {
          btn.onclick = async (e) => {
            const ticketId = e.currentTarget.dataset.id;
            const chatContainer = document.getElementById("admin-chat-container");
            
            chatContainer.innerHTML = `<div class="flex-1 flex items-center justify-center text-accent animate-pulse italic">Loading conversation...</div>`;
            
            const { data: ticket } = await window.sb.from("support_tickets").select("*, user:user_id(username, display_name)").eq("id", ticketId).single();
            
            chatContainer.innerHTML = `
              <div class="p-4 border-b border-border bg-bg/30 flex justify-between items-center">
                <div>
                  <div class="font-bold">${ticket.user?.display_name || ticket.user?.username}</div>
                  <div class="text-[10px] text-text/40">Ticket ID: ${ticket.id}</div>
                </div>
                <div class="flex gap-2">
                  <select id="admin-ticket-status" class="text-xs bg-surface border border-border rounded px-2 py-1 focus:outline-none">
                    <option value="pending" ${ticket.status === 'pending' ? 'selected' : ''}>Pending</option>
                    <option value="resolved" ${ticket.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                  </select>
                </div>
              </div>
              <div id="admin-chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-bg/10"></div>
              <div class="p-4 border-t border-border">
                <form id="admin-chat-form" class="flex gap-2">
                  <input type="text" id="admin-chat-input" placeholder="Type reply..." class="flex-1 p-2 bg-bg border border-border rounded focus:outline-none focus:border-accent text-sm">
                  <button type="submit" class="px-4 py-2 bg-accent text-bg rounded font-bold text-sm">Reply</button>
                </form>
              </div>
            `;

            const adminChatHistory = document.getElementById("admin-chat-history");
            const adminChatForm = document.getElementById("admin-chat-form");
            const adminChatInput = document.getElementById("admin-chat-input");
            const statusSelect = document.getElementById("admin-ticket-status");

            const fetchAdminMessages = async () => {
              const { data: messages, error } = await window.sb
                .from("support_messages")
                .select("*")
                .eq("ticket_id", ticketId)
                .order("created_at", { ascending: true });

              if (error) {
                adminChatHistory.innerHTML = `<div class="text-center text-red-500 p-4">Error loading messages: ${error.message}</div>`;
                return;
              }

              if (messages && messages.length > 0) {
                adminChatHistory.innerHTML = messages.map(msg => `
                  <div class="flex ${msg.sender_role === 'admin' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-2 rounded-xl ${msg.sender_role === 'admin' ? 'bg-accent text-bg rounded-tr-none' : 'bg-surface border border-border rounded-tl-none'}">
                      <div class="text-sm">${msg.message || msg.content || ''}</div>
                      <div class="text-[9px] ${msg.sender_role === 'admin' ? 'text-bg/50' : 'text-text/30'} mt-1 text-right">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                  </div>
                `).join("");
                adminChatHistory.scrollTop = adminChatHistory.scrollHeight;
              } else {
                adminChatHistory.innerHTML = `<div class="text-center text-text/40 py-8 italic">No messages in this ticket yet.</div>`;
              }
            };

            fetchAdminMessages();

            // Status change logic
            statusSelect.onchange = async (e) => {
              const newStatus = e.target.value;
              const { error } = await window.sb.from("support_tickets").update({ status: newStatus, updated_at: new Date().toISOString() }).eq("id", ticketId);
              if (error) window.handleError(error, "Failed to update status");
              else window.showToast(`Ticket marked as ${newStatus}`, "success");
            };

            adminChatForm.onsubmit = async (e) => {
              e.preventDefault();
              const msg = adminChatInput.value.trim();
              if (!msg) return;

              adminChatInput.value = "";
              const { error } = await window.sb.from("support_messages").insert({
                ticket_id: ticketId,
                user_id: ticket.user_id,
                message: msg,
                sender_role: "admin"
              });

              if (error) window.handleError(error, "Failed to send reply");
              else {
                // Update ticket updated_at
                await window.sb.from("support_tickets").update({ updated_at: new Date().toISOString() }).eq("id", ticketId);
                fetchAdminMessages();
              }
            };
          };
        });
      };

        // Router logic moved to centralized router at the end
    </script>

    <!-- Centralized Router (Fixes Fragile Routing) -->
    <script type="module">
      window.loadRoute = () => {
        const hash = window.location.hash || window.lastHash || "#/";
        console.log(`[Router] Navigated to: ${hash}`);
        sessionStorage.setItem("inkroot-last-route", hash);

        // Hide sidebar on mobile after navigation
        if (window.innerWidth < 768) {
          const sidebar = document.getElementById('sidebar');
          const backdrop = document.getElementById('sidebar-backdrop');
          if (sidebar) sidebar.classList.add('-translate-x-full');
          if (backdrop) backdrop.classList.add('hidden');
        }

        if (hash === "#/") window.renderHome();
        else if (hash === "#/feed" || hash === "#/discover") window.renderFeed();
        else if (hash.startsWith("#/write")) window.renderWrite();
        else if (hash.startsWith("#/work/")) {
          const parts = hash.split("/");
          window.renderWork(parts[parts.length - 1]);
        }
        else if (hash.startsWith("#/profile")) {
          const parts = hash.split("/");
          let username = parts[2];
          if (username === "") username = undefined;
          window.renderProfile(username);
        }
        else if (hash === "#/about") window.renderAbout();
        else if (hash === "#/rules") window.renderRules();
        else if (hash === "#/desk") window.renderSprintDesk();
        else if (hash === "#/map") window.renderMap();
        else if (hash === "#/events") window.renderEvents();
        else if (hash === "#/spark") window.renderSpark();
        else if (hash === "#/spark-board") window.renderSparkBoard();
        else if (hash === "#/wallet") window.renderWallet();
        else if (hash.startsWith("#/messages")) {
          const parts = hash.split("/");
          window.renderMessages(parts[2]);
        }
        else if (hash === "#/admin") window.renderAdmin();
        else if (hash === "#/marketplace") window.renderMarketplace();
        else if (hash === "#/support") window.renderSupportChat();
        else {
          const appContent = document.getElementById("app-content");
          if (appContent) appContent.innerHTML = `<div class="p-12 text-center text-text/50">Page not found.</div>`;
        }
      };

      // Final trigger
      window.addEventListener("hashchange", window.loadRoute);
      window.loadRoute();
    </script>
  </body>
</html>
