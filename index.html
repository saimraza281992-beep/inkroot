                    </div>
                  `;

                  body.querySelector(".cancel-edit-btn").onclick = () => fetchComments();
                  body.querySelector(".save-edit-btn").onclick = async () => {
                    const newContent = document.getElementById(`edit-textarea-${id}`).value.trim();
                    if (!newContent) return;
                    
                    const { error } = await window.sb.from("comments").update({ content: newContent }).eq("id", id);
                    if (error) {
                      window.showToast("Failed to update comment", "error");
                    } else {
                      window.showToast("Comment updated", "success");
                      fetchComments();
                    }
                  };
                };
              });

              document.querySelectorAll(".delete-comment-btn").forEach(btn => {
                btn.onclick = async () => {
                  window.showConfirmModal("Delete Comment", "Are you sure you want to delete this comment?", async () => {
                    const id = btn.dataset.id;
                    const { error } = await window.sb.from("comments").delete().eq("id", id);
                    if (error) {
                      window.showToast("Failed to delete comment", "error");
                    } else {
                      window.showToast("Comment deleted", "success");
                      fetchComments();
                    }
                  });
                };
              });

              document.querySelectorAll(".block-comment-btn").forEach(btn => {
                btn.onclick = async () => {
                  const id = btn.dataset.id;
                  const newStatus = btn.dataset.status;
                  const { error } = await window.sb.from("comments").update({ status: newStatus }).eq("id", id);
                  if (error) {
                    window.showToast("Failed to update comment status", "error");
                  } else {
                    window.showToast(`Comment ${newStatus === 'blocked' ? 'blocked' : 'unblocked'}`, "success");
                    fetchComments();
                  }
                };
              });

              document.querySelectorAll(".ban-user-btn").forEach(btn => {
                btn.onclick = async () => {
                  const userId = btn.dataset.userId;
                  window.showConfirmModal("Ban User", "Are you sure you want to ban this user? They will no longer be able to comment.", async () => {
                    const { error } = await window.sb.from("users").update({ is_banned: true }).eq("id", userId);
                    if (error) {
                      window.showToast("Failed to ban user", "error");
                    } else {
                      window.showToast("User banned successfully", "success");
                      fetchComments();
                    }
                  });
                };
              });

            } catch (err) {
              console.error("Exception in fetchComments:", err);
              commentList.innerHTML = `<div class="text-center text-red-500 py-8 italic">An unexpected error occurred while loading comments.</div>`;
            }
          };

          if (submitCommentBtn) {
            submitCommentBtn.onclick = async () => {
              if (!currentUser) return window.showToast("Please sign in to comment", "error");
              
              // Check if banned
              const { data: userData } = await window.sb.from("users").select("is_banned").eq("id", currentUser.id).maybeSingle();
              if (userData?.is_banned) {
                window.showToast("You are banned from commenting", "error");
                return;
              }

              const content = commentTextarea.value.trim();
              if (!content) return;

              try {
                submitCommentBtn.disabled = true;
                submitCommentBtn.textContent = "Posting...";

                const { error } = await window.sb.from("comments").insert({
                  work_id: workId,
                  user_id: currentUser.id,
                  content: content
                });

                if (error) throw error;

                commentTextarea.value = "";
                fetchComments();
                
                // Notify author
                if (work.author_id !== currentUser.id) {
                  window.sb.from("notifications").insert({
                    user_id: work.author_id,
                    type: "comment",
                    content: `${currentUser.user_metadata?.display_name || currentUser.email} commented on your work!`,
                    link: `#/work/${workId}`
                  }).then(({ error }) => { if (error) console.error("Notification error:", error); });
                }
              } catch (err) {
                console.error("Comment action error:", err);
                window.showToast("Failed to post comment", "error");
              } finally {
                submitCommentBtn.disabled = false;
                submitCommentBtn.textContent = "Post Comment";
              }
            };
          }

          fetchLikes();
          fetchComments();

          // Boost Logic
          const boostBtn = document.getElementById("boost-work-btn");
          if (boostBtn && currentUser) {
            boostBtn.onclick = async () => {
              // Fetch user's current ball points and role
              const { data: userData } = await window.sb.from("users").select("ball_points, role").eq("id", currentUser.id).single();
              
              const isAdmin = userData?.role === 'admin';

              if (!isAdmin && (userData?.ball_points || 0) < 1) {
                window.showToast("You need 1 Ball Point Pen to boost a work. Complete Spark challenges to earn them!", "error");
                return;
              }

              boostBtn.disabled = true;
              boostBtn.textContent = "Boosting...";

              try {
                // 1. Deduct Ball Point (if not admin)
                if (!isAdmin) {
                  await window.sb.from("users").update({ ball_points: userData.ball_points - 1 }).eq("id", currentUser.id);
                }
                
                // 2. Mark work as boosted
                await window.sb.from("works").update({ is_boosted: true, boosted_at: new Date().toISOString() }).eq("id", workId);
                
                window.showToast(isAdmin ? "Admin Boost Applied! 🚀" : "Work boosted to the top of the feed! 🚀", "success");
                window.renderWork(workId); // Re-render
              } catch (err) {
                window.showToast("Failed to boost work", "error");
                boostBtn.disabled = false;
                boostBtn.textContent = isAdmin ? "Admin: Free Boost" : "Boost this work (Uses 1 Ball Point)";
              }
            };
          }

          const backBtn = document.getElementById("work-back-btn");
          if (backBtn) {
            backBtn.onclick = () => {
              window.location.hash = window.lastHash;
            };
          }
        } catch (err) {
          console.error(err);
          appContent.innerHTML = `
            <div class="p-12 text-center">
              <h2 class="text-2xl font-serif font-bold text-red-500 mb-4">Error loading work</h2>
              <p class="text-text/50 mb-8">${window.sanitize(err.message)}</p>
              <button onclick="window.history.back()" class="px-6 py-2 bg-accent text-bg rounded font-medium">Go Back</button>
            </div>
          `;
        }
      };

      // 5. Router logic moved to centralized router at the end
    </script>

    <!-- Gamification & Sharing Module -->
    <script type="module">
      // 1. Award Lighthouse Points
      window.awardLighthousePoints = async (
        userId,
        actionType,
        targetId = null,
      ) => {
        if (!userId) return;

        const pointsMap = {
          share: 15,
          spark: 10,
          exchange: 25,
          sprint: 5,
        };

        const amount = pointsMap[actionType] || 0;
        if (amount === 0) return;

        try {
          // Get current points before incrementing
          const { data: userBefore } = await window.sb
            .from("users")
            .select("lighthouse_points")
            .eq("id", userId)
            .single();
          const oldPoints = userBefore?.lighthouse_points || 0;

          // Call RPC to increment
          const { data, error } = await window.sb.rpc(
            "increment_lighthouse_points",
            {
              target_user_id: userId,
              amount: amount,
            },
          );

          if (error) throw error;

          // Log the event
          await window.sb.from("lighthouse_events").insert({
            user_id: userId,
            action_type: actionType,
            points_awarded: amount,
            target_id: targetId,
          });

          const newPoints = oldPoints + amount;
          const unlock = window.checkTierUnlock(oldPoints, newPoints);

          if (unlock) {
            window.showTierUnlockToast(unlock.name, unlock.emoji);
          } else {
            window.showToast(`+${amount} Lighthouse Points!`, "success");
          }
        } catch (err) {
          console.error("Error awarding points:", err);
        }
      };

      // 2. Check Tier Unlock
      window.checkTierUnlock = (oldPoints, newPoints) => {
        const tiers = [
          { threshold: 700, name: "Beacon", emoji: "🗼" },
          { threshold: 350, name: "Illuminator", emoji: "🏮" },
          { threshold: 150, name: "Lantern", emoji: "🪔" },
          { threshold: 50, name: "Spark", emoji: "✨" },
        ];

        for (const tier of tiers) {
          if (oldPoints < tier.threshold && newPoints >= tier.threshold) {
            return { name: tier.name, emoji: tier.emoji };
          }
        }
        return null;
      };

      // 3. Show Tier Unlock Toast
      window.showTierUnlockToast = (tierName, tierEmoji) => {
        const toastContainer = document.getElementById("toast-container");
        if (!toastContainer) return;

        const toast = document.createElement("div");
        toast.className = `bg-accent text-bg px-6 py-4 rounded shadow-2xl mb-2 transition-all duration-300 transform translate-y-0 opacity-100 flex items-center gap-4 border-2 border-accent2`;

        toast.innerHTML = `
        <div class="text-4xl">${tierEmoji}</div>
        <div>
          <div class="font-serif font-bold text-xl">Tier Unlocked!</div>
          <div class="text-sm opacity-90">You are now a <strong>${tierName}</strong>.</div>
        </div>
      `;

        toastContainer.appendChild(toast);

        setTimeout(() => {
          toast.classList.add("opacity-0", "translate-y-2");
          setTimeout(() => toast.remove(), 300);
        }, 5000);
      };

      // 4. Generate Quote Card
      window.generateQuoteCard = (workTitle, excerpt, authorName, city) => {
        const canvas = document.createElement("canvas");
        canvas.width = 1200;
        canvas.height = 630;
        const ctx = canvas.getContext("2d");

        // Background (parchment)
        ctx.fillStyle = "#F4F1EA";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Border
        ctx.strokeStyle = "#D4CCBA";
        ctx.lineWidth = 10;
        ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

        // Inner Border
        ctx.lineWidth = 2;
        ctx.strokeRect(35, 35, canvas.width - 70, canvas.height - 70);

        // Excerpt Text
        ctx.fillStyle = "#2C302E";
        ctx.font = "italic 48px Georgia, serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // Simple word wrap
        const words = excerpt.split(" ");
        let line = "";
        let lines = [];
        const maxWidth = 900;

        for (let n = 0; n < words.length; n++) {
          const testLine = line + words[n] + " ";
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && n > 0) {
            lines.push(line);
            line = words[n] + " ";
          } else {
            line = testLine;
          }
        }
        lines.push(line);

        const lineHeight = 60;
        const startY = (canvas.height - lines.length * lineHeight) / 2 - 40;

        lines.forEach((l, i) => {
          ctx.fillText(l, canvas.width / 2, startY + i * lineHeight);
        });

        // Author & Title
        ctx.font = 'bold 32px "Playfair Display", serif';
        ctx.fillStyle = "#7B2D26"; // accent
        const metaText = `— ${authorName}, ${workTitle}`;
        ctx.fillText(
          metaText,
          canvas.width / 2,
          startY + lines.length * lineHeight + 40,
        );

        // City
        if (city) {
          ctx.font = "24px Inter, sans-serif";
          ctx.fillStyle = "#C9A96E"; // accent2
          ctx.fillText(
            `📍 ${city}`,
            canvas.width / 2,
            startY + lines.length * lineHeight + 90,
          );
        }

        // Watermark
        ctx.font = 'bold 24px "Playfair Display", serif';
        ctx.fillStyle = "rgba(44, 48, 46, 0.3)";
        ctx.textAlign = "right";
        ctx.fillText("Inkroot", canvas.width - 60, canvas.height - 60);

        // Download
        const link = document.createElement("a");
        link.download = `inkroot-quote-${authorName.replace(/\s+/g, "-").toLowerCase()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        // Award points if logged in
        window.sb.auth.getSession().then(({ data }) => {
          if (data?.session?.user) {
            window.awardLighthousePoints(data.session.user.id, "share");
          }
        });
      };

      // 5. Share to Twitter
      window.shareToTwitter = async (workUrl, excerpt, authorName) => {
        const text = `"${excerpt.substring(0, 100)}..."\n\nRead more by ${authorName} on Inkroot:`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(workUrl)}`;
        window.open(url, "_blank");

        const { data } = await window.sb.auth.getSession();
        if (data?.session?.user) {
          window.awardLighthousePoints(data.session.user.id, "share");
        }
      };

      // 6. Share to Facebook
      window.shareToFacebook = async (workUrl) => {
        const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(workUrl)}`;
        window.open(url, "_blank");

        const { data } = await window.sb.auth.getSession();
        if (data?.session?.user) {
          window.awardLighthousePoints(data.session.user.id, "share");
        }
      };

      // 7. Wire share buttons into feed cards
      const injectShareButtons = (card) => {
        if (card.querySelector(".share-buttons")) return;

        const workLink = card.querySelector('a[href^="#/work/"]');
        if (!workLink) return;

        const workUrl =
          window.location.origin +
          window.location.pathname +
          workLink.getAttribute("href");

        const titleEl = card.querySelector("h3");
        const title = titleEl ? titleEl.innerText : "";

        const excerptEl = card.querySelector("p");
        const excerpt = excerptEl ? excerptEl.innerText : "";

        const authorLink = card.querySelector('a[href^="#/profile/"]');
        const authorName = authorLink ? authorLink.innerText : "";

        const cityEl = card.querySelector(".text-xs.text-text\\\/50");
        const cityText = cityEl ? cityEl.innerText : "";
        const city = cityText.replace("📍 ", "").trim();

        const shareContainer = document.createElement("div");
        shareContainer.className =
          "share-buttons flex flex-wrap gap-2 mt-4 pt-4 border-t border-border";
        shareContainer.innerHTML = `
        <button class="btn-twitter text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded hover:bg-blue-100 transition-colors font-medium flex items-center gap-1">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"></path></svg>
          Tweet
        </button>
        <button class="btn-facebook text-xs bg-blue-50 text-blue-800 px-3 py-1.5 rounded hover:bg-blue-100 transition-colors font-medium flex items-center gap-1">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd"></path></svg>
          Share
        </button>
        <button class="btn-quote text-xs bg-accent2/10 text-accent2 px-3 py-1.5 rounded hover:bg-accent2/20 transition-colors font-medium flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Quote Card
        </button>
      `;

        const btnTwitter = shareContainer.querySelector(".btn-twitter");
        if (btnTwitter) btnTwitter.onclick = () =>
          window.shareToTwitter(workUrl, excerpt, authorName);
          
        const btnFacebook = shareContainer.querySelector(".btn-facebook");
        if (btnFacebook) btnFacebook.onclick = () =>
          window.shareToFacebook(workUrl);
          
        const btnQuote = shareContainer.querySelector(".btn-quote");
        if (btnQuote) btnQuote.onclick = () =>
          window.generateQuoteCard(title, excerpt, authorName, city);

        card.appendChild(shareContainer);
      };

      const observer = new MutationObserver((mutations) => {
        const feedContainer = document.getElementById("feed-container");
        if (!feedContainer) return;

        const cards = feedContainer.querySelectorAll(".bg-surface");
        cards.forEach(injectShareButtons);
      });

      // Start observing the body for changes
      observer.observe(document.body, { childList: true, subtree: true });

      // Also run once immediately in case feed is already rendered
      setTimeout(() => {
        const feedContainer = document.getElementById("feed-container");
        if (feedContainer) {
          feedContainer
            .querySelectorAll(".bg-surface")
            .forEach(injectShareButtons);
        }
      }, 500);
    </script>

    <!-- Sprint Timer Module -->
    <script type="module">
      // 1. SprintTimer Class
      class SprintTimer {
        constructor() {
          this.state = "IDLE"; // IDLE, RUNNING, PAUSED, COMPLETED
          this.totalSeconds = 0;
          this.secondsLeft = 0;
          this.interval = null;
          this.radius = 90;
          this.circumference = 2 * Math.PI * this.radius;
        }

        init() {
          this.circle = document.getElementById("timer-circle");
          this.timeDisplay = document.getElementById("timer-display");
          this.statusDisplay = document.getElementById("timer-status");
          this.btnStart = document.getElementById("btn-timer-start");
          this.btnPause = document.getElementById("btn-timer-pause");
          this.btnReset = document.getElementById("btn-timer-reset");
          this.presetBtns = document.querySelectorAll(".preset-btn");
          this.customInput = document.getElementById("custom-time-input");

          if (this.circle) {
            this.circle.style.strokeDasharray = this.circumference;
            this.circle.style.strokeDashoffset = 0;
          }

          this.bindEvents();
          this.renderLog();
        }

        bindEvents() {
          this.presetBtns.forEach((btn) => {
            btn.onclick = () => {
              if (this.state === "RUNNING") return;
              const mins = parseInt(btn.dataset.time);
              this.setTimer(mins);
            };
          });

          if (this.customInput) {
            this.customInput.onchange = (e) => {
              if (this.state === "RUNNING") return;
              const mins = parseInt(e.target.value);
              if (mins > 0) this.setTimer(mins);
            };
          }

          if (this.btnStart) {
            this.btnStart.onclick = () => {
              if (this.state === "IDLE" || this.state === "COMPLETED") {
                let mins = 25; // default
                const activePreset =
                  document.querySelector(".preset-btn.active");
                if (activePreset) {
                  mins = parseInt(activePreset.dataset.time);
                } else if (this.customInput && this.customInput.value) {
                  mins = parseInt(this.customInput.value);
                }
                this.start(mins);
              } else if (this.state === "PAUSED") {
                this.resume();
              }
            };
          }

          if (this.btnPause) {
            this.btnPause.onclick = () => this.pause();
          }

          if (this.btnReset) {
            this.btnReset.onclick = () => this.reset();
          }
        }

        setTimer(minutes) {
          this.presetBtns.forEach((b) =>
            b.classList.remove("active", "bg-accent", "text-bg"),
          );
          this.presetBtns.forEach((b) =>
            b.classList.add("bg-surface", "text-text"),
          );

          const btn = Array.from(this.presetBtns).find(
            (b) => parseInt(b.dataset.time) === minutes,
          );
          if (btn) {
            btn.classList.remove("bg-surface", "text-text");
            btn.classList.add("active", "bg-accent", "text-bg");
            if (this.customInput) this.customInput.value = "";
          } else {
            if (this.customInput) this.customInput.value = minutes;
          }

          this.totalSeconds = minutes * 60;
          this.secondsLeft = this.totalSeconds;
          this.updateDisplay();
        }

        start(minutes) {
          if (this.totalSeconds === 0 || this.state === "COMPLETED") {
            this.totalSeconds = minutes * 60;
            this.secondsLeft = this.totalSeconds;
          }
          this.state = "RUNNING";
          this.updateUI();
          this.interval = setInterval(() => this.tick(), 1000);
        }

        pause() {
          if (this.state !== "RUNNING") return;
          this.state = "PAUSED";
          clearInterval(this.interval);
          this.updateUI();
        }

        resume() {
          if (this.state !== "PAUSED") return;
          this.state = "RUNNING";
          this.updateUI();
          this.interval = setInterval(() => this.tick(), 1000);
        }

        reset() {
          this.state = "IDLE";
          clearInterval(this.interval);
          this.secondsLeft = this.totalSeconds;
          this.updateDisplay();
          this.updateUI();
        }

        tick() {
          if (this.secondsLeft > 0) {
            this.secondsLeft--;
            this.updateDisplay();
          } else {
            this.complete();
          }
        }

        updateDisplay() {
          if (!this.timeDisplay) return;
          const m = Math.floor(this.secondsLeft / 60)
            .toString()
            .padStart(2, "0");
          const s = (this.secondsLeft % 60).toString().padStart(2, "0");
          this.timeDisplay.textContent = `${m}:${s}`;

          if (this.circle && this.totalSeconds > 0) {
            const progress = this.secondsLeft / this.totalSeconds;
            const offset = this.circumference - progress * this.circumference;
            this.circle.style.strokeDashoffset = offset;
          }
        }

        updateUI() {
          if (!this.statusDisplay) return;
          this.statusDisplay.textContent = this.state;

          if (this.state === "RUNNING") {
            this.btnStart.classList.add("hidden");
            this.btnPause.classList.remove("hidden");
            this.btnReset.classList.remove("hidden");
          } else if (this.state === "PAUSED") {
            this.btnStart.classList.remove("hidden");
            this.btnStart.textContent = "Resume";
            this.btnPause.classList.add("hidden");
            this.btnReset.classList.remove("hidden");
          } else {
            this.btnStart.classList.remove("hidden");
            this.btnStart.textContent = "Start Sprint";
            this.btnPause.classList.add("hidden");
            this.btnReset.classList.add("hidden");
          }
        }

        complete() {
          this.state = "COMPLETED";
          clearInterval(this.interval);
          this.updateDisplay();
          this.updateUI();
          this.showCompletionModal();
        }

        showCompletionModal() {
          const modal = document.createElement("div");
          modal.className =
            "fixed inset-0 bg-black/50 flex items-center justify-center z-[100] backdrop-blur-sm";
          modal.innerHTML = `
            <div class="bg-surface border border-border rounded-lg shadow-xl w-full max-w-md p-6">
              <h2 class="text-2xl font-serif font-bold mb-4 text-center">Sprint Completed! 🎉</h2>
              <p class="text-center text-text/80 mb-6">Great job! How many words did you write?</p>
              
              <input type="number" id="sprint-words" placeholder="Word count" class="w-full px-4 py-3 rounded bg-bg border border-border focus:outline-none focus:border-accent text-text text-center text-xl mb-6">
              
              <div class="flex gap-4">
                <button id="btn-sprint-save" class="flex-1 py-3 bg-accent text-bg rounded font-medium hover:opacity-90 transition-opacity">Save & Claim Points</button>
              </div>
            </div>
          `;
          document.body.appendChild(modal);

          const btnSprintSave = document.getElementById("btn-sprint-save");
          if (btnSprintSave) {
            btnSprintSave.onclick = async () => {
              const words =
                parseInt(document.getElementById("sprint-words").value) || 0;
              this.logSprint(this.totalSeconds / 60, words);

              // Award points
              const { data } = await window.sb.auth.getSession();
              if (data?.session?.user) {
                await window.awardLighthousePoints(
                  data.session.user.id,
                  "sprint",
                );
              }

              modal.remove();
              this.renderLog();
            };
          }
        }

        logSprint(minutes, words) {
          const log = JSON.parse(
            localStorage.getItem("inkroot_sprints") || "[]",
          );
          log.unshift({
            date: new Date().toISOString(),
            minutes,
            words,
            wpm: Math.round(words / minutes),
          });
          if (log.length > 5) log.pop();
          localStorage.setItem("inkroot_sprints", JSON.stringify(log));
        }

        renderLog() {
          const logContainer = document.getElementById("sprint-log");
          if (!logContainer) return;

          const log = JSON.parse(
            localStorage.getItem("inkroot_sprints") || "[]",
          );

          if (log.length === 0) {
            logContainer.innerHTML =
              '<p class="text-text/50 text-center py-4">No sprints recorded yet.</p>';
            return;
          }

          let html = `
            <table class="w-full text-sm text-left">
              <thead class="text-xs text-text/60 uppercase bg-bg/50">
                <tr>
                  <th class="px-4 py-2 rounded-tl">Date</th>
                  <th class="px-4 py-2">Duration</th>
                  <th class="px-4 py-2">Words</th>
                  <th class="px-4 py-2 rounded-tr">WPM</th>
                </tr>
              </thead>
              <tbody>
          `;

          log.forEach((entry) => {
            const date = new Date(entry.date).toLocaleDateString(undefined, {
              month: "short",
              day: "numeric",
            });
            html += `
              <tr class="border-b border-border/50 last:border-0">
                <td class="px-4 py-3">${date}</td>
                <td class="px-4 py-3">${entry.minutes}m</td>
                <td class="px-4 py-3 font-medium">${entry.words}</td>
                <td class="px-4 py-3 text-accent">${entry.wpm}</td>
              </tr>
            `;
          });

          html += `</tbody></table>`;
          logContainer.innerHTML = html;
        }
      }

      // 2. Render Sprint Desk
      window.renderSprintDesk = () => {
        const appContent = document.getElementById("app-content");

        appContent.innerHTML = `
          <div class="max-w-4xl mx-auto p-4 md:p-8">
            <div class="flex items-center justify-between mb-8">
              <h1 class="text-3xl font-serif font-bold">Writer's Desk</h1>
              <div class="text-sm text-text/60">Focus & Flow</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
              <!-- Timer Panel -->
              <div class="md:col-span-2 bg-surface border border-border rounded-lg p-8 shadow-sm flex flex-col items-center">
                
                <!-- Presets -->
                <div class="flex flex-wrap justify-center gap-2 mb-8">
                  <button class="preset-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-surface border border-border text-text hover:bg-bg" data-time="10">10m</button>
                  <button class="preset-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-surface border border-border text-text hover:bg-bg" data-time="15">15m</button>
                  <button class="preset-btn active px-4 py-2 rounded-full text-sm font-medium transition-colors bg-accent text-bg" data-time="25">25m</button>
                  <button class="preset-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-surface border border-border text-text hover:bg-bg" data-time="30">30m</button>
                  <button class="preset-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-surface border border-border text-text hover:bg-bg" data-time="45">45m</button>
                  <input type="number" id="custom-time-input" placeholder="Custom" class="w-20 px-3 py-2 rounded-full text-sm bg-bg border border-border focus:outline-none focus:border-accent text-center">
                </div>

                <!-- Circle Timer -->
                <div class="relative w-64 h-64 mb-8 flex items-center justify-center">
                  <svg class="w-full h-full transform -rotate-90" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="var(--border)" stroke-width="8" />
                    <circle id="timer-circle" cx="100" cy="100" r="90" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" class="transition-all duration-1000 ease-linear" />
                  </svg>
                  <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div id="timer-display" class="text-5xl font-mono font-bold text-text tracking-tight">25:00</div>
                    <div id="timer-status" class="text-sm text-text/50 font-medium uppercase tracking-widest mt-2">IDLE</div>
                  </div>
                </div>

                <!-- Controls -->
                <div class="flex gap-4">
                  <button id="btn-timer-start" class="px-8 py-3 bg-accent text-bg rounded-full font-medium hover:opacity-90 transition-opacity w-40">Start Sprint</button>
                  <button id="btn-timer-pause" class="hidden px-8 py-3 bg-surface border border-border text-text rounded-full font-medium hover:bg-bg transition-colors w-40">Pause</button>
                  <button id="btn-timer-reset" class="hidden px-8 py-3 bg-bg border border-border text-text/70 rounded-full font-medium hover:text-text transition-colors w-40">Reset</button>
                </div>
              </div>

              <!-- Log Panel -->
              <div class="bg-surface border border-border rounded-lg p-6 shadow-sm h-fit">
                <h3 class="font-serif font-bold text-xl mb-4">Recent Sprints</h3>
                <div id="sprint-log" class="overflow-x-auto">
                  <!-- Log table injected here -->
                </div>
              </div>
            </div>
          </div>
        `;

        window.currentSprintTimer = new SprintTimer();
        window.currentSprintTimer.init();
        window.currentSprintTimer.setTimer(25);
      };

      // 3. Router logic moved to centralized router at the end
    </script>

    <!-- Literary Map & Events Module -->
    <script type="module">
      // 1. Render Map
      window.renderMap = async () => {
        const appContent = document.getElementById("app-content");
        appContent.innerHTML = `
          <div class="relative w-full h-full flex flex-col">
            <!-- Search Bar -->
            <div class="absolute top-4 left-4 right-4 md:left-auto md:right-4 md:w-80 z-[1000] flex gap-2">
              <input type="text" id="map-search-input" placeholder="Search location..." class="flex-1 px-4 py-2 bg-surface border border-border rounded-lg shadow-lg focus:outline-none focus:border-accent text-sm">
              <button id="btn-map-search" class="px-4 py-2 bg-accent text-bg rounded-lg shadow-lg hover:opacity-90 transition-opacity">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              </button>
            </div>
            
            <div id="map-container" class="flex-1 w-full h-full z-0"></div>
            
            <button id="fab-add-pin" class="absolute bottom-8 right-8 z-[1000] bg-accent text-bg w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:opacity-90 transition-opacity">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
          </div>
        `;

        // Initialize map
        const map = L.map("map-container");
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);

        // Geolocation
        const defaultLocation = [30.3753, 69.3451];
        map.setView(defaultLocation, 5);

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              map.setView([pos.coords.latitude, pos.coords.longitude], 12);
            },
            (err) => {
              console.warn("Geolocation failed:", err);
            },
          );
        }

        // Search logic
        const mapSearchInput = document.getElementById("map-search-input");
        const btnMapSearch = document.getElementById("btn-map-search");

        const performSearch = async (query) => {
          if (!query) return;
          try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const results = await response.json();
            if (results && results.length > 0) {
              const { lat, lon } = results[0];
              map.setView([lat, lon], 14);
            } else {
              window.showToast("Location not found", "error");
            }
          } catch (err) {
            console.error("Search error:", err);
            window.showToast("Search failed", "error");
          }
        };

        if (btnMapSearch) btnMapSearch.onclick = () => performSearch(mapSearchInput.value);
        if (mapSearchInput) mapSearchInput.onkeypress = (e) => {
          if (e.key === "Enter") performSearch(mapSearchInput.value);
        };

        // Fetch pins
        const fetchPins = async () => {
          const { data, error } = await window.sb
            .from("map_pins")
            .select("*, user:user_id(username, display_name)");

          if (error) {
            console.error("Error fetching pins:", error);
            return;
          }

          // Clear existing layers except tile layer
          map.eachLayer((layer) => {
            if (layer instanceof L.CircleMarker) {
              map.removeLayer(layer);
            }
          });

          const typeColors = {
            cafe: "#f59e0b", // amber
            bookstore: "#800020", // burgundy
            event: "#14b8a6", // teal
          };

          data.forEach((pin) => {
            const color = typeColors[pin.type] || "#7B2D26";
            const marker = L.circleMarker([pin.lat, pin.lng], {
              radius: 8,
              fillColor: color,
              color: "#fff",
              weight: 2,
              opacity: 1,
              fillOpacity: 0.8,
            }).addTo(map);

            const authorName = window.sanitize(
              pin.user?.display_name || pin.user?.username || "Anonymous"
            );
            marker.bindPopup(`
              <div class="font-sans">
                <h3 class="font-serif font-bold text-lg m-0">${window.sanitize(pin.name)}</h3>
                <span class="text-xs uppercase tracking-wider text-text/60">${window.sanitize(pin.type)}</span>
                <p class="mt-2 mb-2 text-sm">${window.sanitize(pin.description) || ""}</p>
                <div class="text-xs text-text/50">Added by: ${authorName}</div>
              </div>
            `);
          });
        };

        await fetchPins();

        // Add Pin FAB
        const fabAddPin = document.getElementById("fab-add-pin");
        if (fabAddPin) fabAddPin.onclick = async () => {
          const { data } = await window.sb.auth.getSession();
          if (!data?.session?.user) {
            window.showToast("Please sign in to add a pin.", "error");
            return;
          }

          const modal = document.createElement("div");
          modal.className =
            "fixed inset-0 bg-black/50 flex items-center justify-center z-[2000] backdrop-blur-sm";
          modal.innerHTML = `
            <div class="bg-surface border border-border rounded-lg shadow-xl w-full max-w-md p-6">
              <h2 class="text-2xl font-serif font-bold mb-4">Add a Literary Pin</h2>
              <form id="add-pin-form" class="flex flex-col gap-4">
                <input type="text" id="pin-name" placeholder="Name (e.g., The Writer's Block Cafe)" required class="w-full px-4 py-2 rounded bg-bg border border-border focus:outline-none focus:border-accent text-text">
                
                <div class="flex gap-2">
                  <input type="text" id="pin-search-loc" placeholder="Search address..." class="flex-1 px-4 py-2 rounded bg-bg border border-border focus:outline-none focus:border-accent text-text text-sm">
                  <button type="button" id="btn-pin-loc-search" class="px-3 py-2 bg-surface border border-border rounded hover:bg-bg transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </button>
                </div>

                <select id="pin-type" required class="w-full px-4 py-2 rounded bg-bg border border-border focus:outline-none focus:border-accent text-text">
                  <option value="cafe">Cafe</option>
                  <option value="bookstore">Bookstore</option>
                  <option value="event">Event Space</option>
                  <option value="other">Other</option>
                </select>
                <textarea id="pin-desc" placeholder="Description" rows="3" class="w-full px-4 py-2 rounded bg-bg border border-border focus:outline-none focus:border-accent text-text"></textarea>
                <div class="flex gap-4 mt-2">
                  <button type="button" id="btn-cancel-pin" class="flex-1 py-2 border border-border text-text rounded font-medium hover:bg-bg transition-colors">Cancel</button>
                  <button type="submit" class="flex-1 py-2 bg-accent text-bg rounded font-medium hover:opacity-90 transition-opacity">Next</button>
                </div>
              </form>
            </div>
          `;
          document.body.appendChild(modal);

          const btnPinLocSearch = document.getElementById("btn-pin-loc-search");
          const pinSearchLocInput = document.getElementById("pin-search-loc");
          if (btnPinLocSearch) btnPinLocSearch.onclick = () => performSearch(pinSearchLocInput.value);
          if (pinSearchLocInput) pinSearchLocInput.onkeypress = (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              performSearch(pinSearchLocInput.value);
            }
          };

          const btnCancelPin = document.getElementById("btn-cancel-pin");
          if (btnCancelPin) btnCancelPin.onclick = () => modal.remove();

          const addPinForm = document.getElementById("add-pin-form");
          if (addPinForm) addPinForm.onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById("pin-name").value;
            const type = document.getElementById("pin-type").value;
            const description = document.getElementById("pin-desc").value;
            modal.remove();

            window.showToast("Click on the map to place your pin.", "info");

            // Change cursor
            document.getElementById("map-container").style.cursor = "crosshair";

            map.once("click", async (e) => {
              document.getElementById("map-container").style.cursor = "";
              const { lat, lng } = e.latlng;

              try {
                const { error } = await window.sb.from("map_pins").insert({
                  name,
                  type,
                  description,
                  lat,
                  lng,
                  user_id: data.session.user.id,
                });
                if (error) throw error;
                window.showToast("Pin added successfully!", "success");
                await fetchPins();
              } catch (err) {
                window.showToast(err.message, "error");
              }
            });
          };
        };
      };

      // 2. Render Events
      window.renderEvents = async () => {
        const appContent = document.getElementById("app-content");
        appContent.innerHTML = `
          <div class="max-w-5xl mx-auto p-4 md:p-8">
            <div class="flex items-center justify-between mb-8">
              <div>
                <h1 class="text-3xl font-serif font-bold">Literary Events</h1>
                <div class="text-sm text-text/60">Readings, workshops, and meetups</div>
              </div>
              <button id="btn-post-event" class="px-6 py-2 bg-accent text-bg rounded font-medium hover:opacity-90 transition-opacity">Post Event</button>
            </div>
            
            <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="col-span-full text-center py-12"><div class="animate-pulse text-accent">Loading events...</div></div>
            </div>
          </div>
        `;

        const fetchAndRenderEvents = async () => {
          const { data: sessionData } = await window.sb.auth.getSession();
          const currentUserId = sessionData?.session?.user?.id;

          const now = new Date().toISOString();
          const { data, error } = await window.sb
            .from("events")
            .select("*, organizer:organizer_id(username, display_name)")
            .eq("status", "published")
            .gte("event_date", now)
            .order("event_date", { ascending: true });

          const container = document.getElementById("events-container");

          if (error) {
            container.innerHTML = `<div class="col-span-full text-center text-red-500">Error loading events.</div>`;
            return;
          }

          if (!data || data.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center text-text/50 py-12 bg-surface border border-border border-dashed rounded-lg">No upcoming events found.</div>`;
            return;
          }

          container.innerHTML = data
            .map((event) => {
              const dateObj = new Date(event.event_date);
              const dateStr = dateObj.toLocaleDateString(undefined, {
                weekday: "short",
                month: "short",
                day: "numeric",
              });
              const timeStr = dateObj.toLocaleTimeString(undefined, {
                hour: "2-digit",
                minute: "2-digit",
              });

              const rsvps = event.rsvps || [];
              const rsvpCount = rsvps.length;
              const isGoing = currentUserId && rsvps.includes(currentUserId);

              const organizerName = window.sanitize(
                event.organizer?.display_name ||
                event.organizer?.username ||
                "Anonymous"
              );

              return `
              <div class="bg-surface border border-border rounded-lg p-6 shadow-sm flex flex-col">
                <div class="flex justify-between items-start mb-4">
                  <span class="text-xs font-medium px-2 py-1 rounded-full bg-accent2/20 text-accent2 uppercase tracking-wider">${event.type || 'Event'}</span>
                  <div class="text-right">
                    <div class="font-bold text-accent">${dateStr}</div>
                    <div class="text-sm text-text/60">${timeStr}</div>
                  </div>
                </div>
                
                <h3 class="text-2xl font-serif font-bold mb-2">${window.sanitize(event.title)}</h3>
                <div class="text-sm text-text/70 mb-4 flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                  ${window.sanitize(event.location)}
                  ${event.lat && event.lng ? `<a href="#/map" onclick="window.lastMapCenter = [${event.lat}, ${event.lng}]; window.lastMapZoom = 15;" class="ml-1 text-accent hover:underline">(View on Map)</a>` : ""}
                </div>
                
                <p class="text-text/80 text-sm mb-6 flex-1">${window.sanitize(event.description) || ''}</p>
                
                <div class="flex items-center justify-between mt-auto pt-4 border-t border-border">
                  <div class="text-xs text-text/50">
                    Organized by ${organizerName}<br>
                    ${rsvpCount} attending
                  </div>
                  <button class="btn-rsvp px-4 py-2 rounded font-medium transition-colors ${isGoing ? 'bg-surface border border-border text-text' : 'bg-accent text-bg hover:opacity-90'}" data-id="${event.id}" data-going="${isGoing}">
                    ${isGoing ? 'Attending' : 'RSVP'}
                  </button>
                </div>
              </div>
            `;
            })
            .join("");

          // Bind RSVP buttons
          document.querySelectorAll(".btn-rsvp").forEach((btn) => {
            btn.onclick = async (e) => {
              if (!currentUserId) {
                window.handleError(null, "Please sign in to RSVP.");
                return;
              }

              const eventId = e.target.dataset.id;
              const isGoing = e.target.dataset.going === "true";

              const event = data.find((ev) => ev.id === eventId);
              let newRsvps = event.rsvps || [];

              if (isGoing) {
                newRsvps = newRsvps.filter((id) => id !== currentUserId);
              } else {
                if (!newRsvps.includes(currentUserId)) {
                  newRsvps.push(currentUserId);
                }
              }

              e.target.disabled = true;
              try {
                const { error } = await window.sb
                  .from("events")
                  .update({ rsvps: newRsvps })
                  .eq("id", eventId);
                if (error) throw error;
                window.showToast(
                  isGoing ? "RSVP cancelled." : "RSVP confirmed!",
                  "success",
                );
                await fetchAndRenderEvents();
              } catch (err) {
                window.handleError(err, "Failed to update RSVP.");
                e.target.disabled = false;
              }
            };
          });
        };

        await fetchAndRenderEvents();

        // Post Event Modal
        const btnPostEvent = document.getElementById("btn-post-event");
        if (btnPostEvent) btnPostEvent.onclick = async () => {
          const { data } = await window.sb.auth.getSession();
          if (!data?.session?.user) {
            window.handleError(null, "Please sign in to post an event.");
            return;
          }

          const modal = document.createElement("div");
          modal.className =

          const performEvSearch = async (query) => {
            if (!query) return;
            try {
              const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
              const results = await response.json();
              if (results && results.length > 0) {
                const { lat, lon, display_name } = results[0];

                document.getElementById("ev-lng").value = lon;

          const btnCancelEv = document.getElementById("btn-cancel-ev");
          if (btnCancelEv) btnCancelEv.onclick = () => modal.remove();

          const postEventForm = document.getElementById("post-event-form");
          if (postEventForm) postEventForm.onsubmit = async (e) => {

            const location = document.getElementById("ev-location").value;
            const lat = document.getElementById("ev-lat").value;
            const lng = document.getElementById("ev-lng").value;
            const type = document.getElementById("ev-type").value;
            const description = document.getElementById("ev-desc").value;

            if (!lat || !lng) {
              window.showToast("Please search and confirm a location on the map first.", "error");
              return;
            }

            const eventDateTime = new Date(`${date}T${time}`).toISOString();

            const submitBtn = document.getElementById("btn-submit-ev");
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            const eventData = {
              title,
              event_date: eventDateTime,
              location,
              type,
              description,
              organizer_id: data.session.user.id,
              rsvps: [],
              status: 'pending'
            };

            // Only add lat/lng if they were actually found
            if (lat) eventData.lat = parseFloat(lat);
            if (lng) eventData.lng = parseFloat(lng);

            try {
              const { error } = await window.sb.from("events").insert(eventData);
              if (error) throw error;
              window.showToast("Event submitted for approval!", "success");
              modal.remove();
              await fetchAndRenderEvents();
            } catch (err) {
              if (err.message?.includes("column \"lat\" does not exist") || err.message?.includes("lat")) {
                window.showToast("Database error: Please add 'lat', 'lng', and 'status' columns to your Supabase 'events' table.", "error");
              } else {
                window.handleError(err);

              submitBtn.disabled = false;
              submitBtn.textContent = "Post Event";

          };

      };

              <div class="bg-bg border border-border rounded-xl p-6">

        const startZenChamber = (totalTime, targetWords) => {
          // Hide sidebar and other distractions
          document.querySelector("aside").style.display = "none";
          document.querySelector("main").classList.remove("flex-1");
          document.querySelector("main").classList.add("w-full", "h-screen", "fixed", "inset-0", "z-[5000]", "bg-bg");

          appContent.innerHTML = `

                  <div class="text-xl font-serif font-bold italic">"${window.sanitize(activeSpark.prompt_text)}"</div>
                </div>
                
                <div class="flex items-center gap-8">
                  <div id="word-counter-container" class="text-right">
                    <div class="text-xs text-text/50 uppercase font-bold tracking-widest">Words</div>
                    <div id="word-count" class="text-4xl font-serif font-bold">0 <span class="text-lg text-text/40">/ ${targetWords}</span></div>
                  </div>
                  
                  <div id="timer-container" class="circular-progress">
                    <div class="value-container" id="timer-text">${totalTime}s</div>
                  </div>
                </div>
              </div>

              <div class="flex-1 max-w-5xl mx-auto w-full relative">
                <textarea 
                  id="zen-textarea" 
                  class="w-full h-full bg-transparent border-none focus:ring-0 text-2xl md:text-3xl font-serif leading-relaxed resize-none placeholder:text-text/10"
                  placeholder="The words are waiting..."
                  autofocus
                ></textarea>
                <div class="absolute bottom-4 right-0 text-xs text-text/30 italic">Zen Chamber Active — No distractions, just you and the ink.</div>
              </div>
            </div>
          `;

          const textarea = document.getElementById("zen-textarea");
          const wordCountEl = document.getElementById("word-count");
          const timerText = document.getElementById("timer-text");
          const progressBar = document.querySelector(".circular-progress");
          
          let timeLeft = totalTime;
          let words = 0;

          // Sound Effects (using AudioContext for reliability)
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const playTick = () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
          };

          const playAlarm = () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            // Update circular progress

              playAlarm();

              ${success ? `
                <div class="bg-accent/10 border border-accent/20 rounded-xl p-6 text-accent">
                  <h3 class="text-xl font-serif font-bold mb-2">You earned a reward!</h3>
                  <p class="text-sm font-medium">
                    ${timeLimit === 30 ? '30 Quills 🪶' : timeLimit === 60 ? '20 Ink Pens ✒️' : '10 Ball Points 🖊️'}

                  <p class="text-xs mt-2 opacity-70">Your work has been published to the Spark feed.</p>
                </div>
              ` : `
                <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-6 text-red-600">
                  <h3 class="text-xl font-serif font-bold mb-2">So close!</h3>
                  <p class="text-sm font-medium">You needed ${target} words to earn the reward.</p>
                </div>
              `}

              <div class="flex gap-4 justify-center">
                <button id="btn-spark-back" class="px-6 py-2 border border-border rounded-full font-medium">Back to Spark</button>
                ${success ? `<button id="btn-view-work" class="px-6 py-2 bg-accent text-bg rounded-full font-medium">View My Work</button>` : ''}
              </div>
            </div>
          `;

          if (success) {
            // 1. Save Work
            const { data: newWork, error: insertError } = await window.sb.from("works").insert({
              author_id: userId,
              title: `Spark: ${activeSpark.prompt_text.substring(0, 30)}...`,
              content: content,
              status: 'published',
              type: 'spark'
            }).select().single();

            if (insertError) {
              window.showToast("Failed to submit Spark. Please try again.", "error");
              console.error("Spark submission error:", insertError);
              submitBtn.disabled = false;
              submitBtn.textContent = "Publish to Spark Board";
              return;
            }

            // 2. Update User Rewards
            const rewardField = timeLimit === 30 ? 'quills' : timeLimit === 60 ? 'ink_pens' : 'ball_points';
            const rewardAmount = timeLimit === 30 ? 30 : timeLimit === 60 ? 20 : 10;
            
            await window.sb.from("users").update({ 
              [rewardField]: (user[rewardField] || 0) + rewardAmount 
            }).eq("id", userId);

            if (document.getElementById("btn-view-work")) {
              document.getElementById("btn-view-work").onclick = () => {
                window.location.hash = `#/work/${newWork.id}`;
              };
            }
          }

          document.getElementById("btn-spark-back").onclick = () => window.renderSpark();
        };

        renderSparkHome();
      };

      // Router logic moved to centralized router at the end

      // Public Spark Board Module
      window.renderSparkBoard = async () => {
        const appContent = document.getElementById("app-content");
        appContent.innerHTML = `<div class="p-8 text-center"><div class="animate-pulse text-accent">Loading Spark Board...</div></div>`;

        const { data: sessionData } = await window.sb.auth.getSession();
        const currentUser = sessionData?.session?.user;
        let isAdmin = false;
        if (currentUser) {
          const { data: userData } = await window.sb.from("users").select("role").eq("id", currentUser.id).maybeSingle();
          isAdmin = userData?.role === 'admin';
        }

        const [{ data: submissions, error }, { data: siteConfig }] = await Promise.all([
          window.sb
            .from("works")
            .select("*, author:author_id(username, display_name, avatar_url, role)")
            .eq("type", "spark")
            .eq("status", "published")
            .order("created_at", { ascending: false }),
          window.sb.from("site_config").select("*")
        ]);

        if (error) {
          console.error("Spark Board Error:", error);
          appContent.innerHTML = `<div class="p-8 text-center text-red-500">Failed to load Spark Board: ${error.message || JSON.stringify(error)}</div>`;
          return;

                    <option value="nayapay">NayaPay</option>
